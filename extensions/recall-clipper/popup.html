<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recall Clipper</title>
    <style>
      body { font-family: system-ui, sans-serif; width: 280px; padding: 12px; margin: 0; }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 6px 8px; }
      button { width: 100%; padding: 8px; cursor: pointer; }
      p { font-size: 12px; color: #666; }
    </style>
  </head>
  <body>
    <h3 style="margin: 0 0 12px">Recall Clipper</h3>
    <label>Recall base URL</label>
    <input id="baseUrl" placeholder="https://recalls.sh" />
    <label>API key (rcsk_…)</label>
    <input id="apiKey" type="password" />
    <label>Library ID</label>
    <input id="libraryId" />
    <button id="save">Save</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
